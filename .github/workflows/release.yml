name: Release

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    branches: [master]

permissions:
  contents: write


jobs:
  release:
    if: github.head_ref == 'release' && github.event.pull_request.merged == true
    runs-on: tenki-standard-autoscale
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Environment
        run: |
          rustup update stable
          cargo install knope
      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_API_KEY }}
        run: |
          knope release
          for crate in sia_core_derive sia_core sia_mux sia_storage; do
            output=$(cargo publish -p "$crate" --registry crates-io 2>&1) || {
              if echo "$output" | grep -q "already exists"; then
                echo "Skipping $crate (already published)"
              else
                echo "$output" >&2
                exit 1
              fi
            }
          done