name: Main

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  test:
    runs-on: tenki-standard-autoscale
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
      - name: Build Go interop helper
        run: cd sia_mux/testutil/go-interop && go build -o interop .
      - name: Setup Environment
        run: |
          rustup update stable
          rustup toolchain install nightly
          rustup target add wasm32-unknown-unknown
          rustup component add rustfmt --toolchain nightly
      - name: Install wasm-pack
        shell: bash
        run: curl https://wasm-bindgen.github.io/wasm-pack/installer/init.sh -sSf | bash
      - name: Clippy (wasm)
        run: cargo clippy --target wasm32-unknown-unknown --lib --package sia_core --package sia_storage --no-default-features -- -D warnings
        env:
          RUSTFLAGS: '--cfg=web_sys_unstable_apis'
      - name: Rustfmt
        run: cargo +nightly fmt --all -- --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Build docs
        run: cargo doc --all-features --no-deps
        env:
          RUSTDOCFLAGS: "-D warnings"
      - name: Build benches
        run: cargo build --benches --features=mock
      - name: Test (native)
        run: cargo test --all-features
      - name: Test (wasm - sia_core)
        run: wasm-pack -vv test --release --headless --chrome sia_core
        env:
          RUSTFLAGS: '--cfg=web_sys_unstable_apis'
          WASM_BINDGEN_TEST_TIMEOUT: '300'
      - name: Test (wasm - sia_storage)
        # --lib skips compiling the native-only benchmark example
        run: cd sia_storage && wasm-pack test --release --headless --chrome -- --lib
        env:
          RUSTFLAGS: '--cfg=web_sys_unstable_apis'
          WASM_BINDGEN_TEST_TIMEOUT: '300'
