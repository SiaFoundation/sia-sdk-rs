[packages.sia_sdk]
versioned_files = ["sia/Cargo.toml"]
changelog = "sia/CHANGELOG.md"

[packages.sia_sdk_derive]
versioned_files = ["sia_derive/Cargo.toml"]
changelog = "sia_derive/CHANGELOG.md"

[packages.sia_rhp4_quic]
versioned_files = ["rhp4_quic/Cargo.toml"]
changelog = "rhp4_quic/CHANGELOG.md"

[[workflows]]
name = "document-change"

[[workflows.steps]]
type = "CreateChangeFile"

[[workflows]]
name = "prepare-release"
ignore_conventional_commits = true

[[workflows.steps]]
type = "PrepareRelease"

[[workflows]]
name = "release"

[[workflows.steps]]
type = "Release"

[github]
owner = "SiaFoundation"
repo = "sia-sdk-rs"
